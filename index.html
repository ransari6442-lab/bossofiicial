<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOSS OFFICIAL  | Official Telegram Community</title>

  
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#020814,#07192f,#020814);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
      color:#fff;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(7,17,31,.95);
      border-radius:30px;
      padding:30px 22px;
      text-align:center;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 0 40px rgba(0,140,255,.15);
    }

    .profile{
      width:160px;
      height:160px;
      margin:auto;
      border-radius:50%;
      padding:5px;
      background:linear-gradient(45deg,#00d9ff,#0088cc,#229ed9);
      background-size:300% 300%;
      animation:glow 5s linear infinite;
    }

    .profile img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #07111f;
    }

    @keyframes glow{
      0%{background-position:0% 50%;}
      100%{background-position:300% 50%;}
    }

    .title{
      font-size:36px;
      color:#00d9ff;
      margin-top:15px;
      font-weight:800;
    }

    .subtitle{
      font-size:15px;
      color:#cfd8e3;
      margin:15px 0 25px;
      line-height:1.6;
    }

    .btn{
      display:block;
      width:100%;
      background:linear-gradient(90deg,#229ed9,#0088cc);
      padding:16px;
      border-radius:14px;
      color:#fff;
      text-decoration:none;
      font-size:18px;
      font-weight:700;
      box-shadow:0 0 25px rgba(0,136,204,.4);
    }

    .timer-box{
      margin-top:18px;
      padding:12px;
      background:#0c1728;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      font-size:16px;
      color:#fff;
    }

    .timer{
      color:#00d9ff;
      font-weight:800;
      font-size:20px;
    }

    .footer{
      margin-top:18px;
      font-size:13px;
      color:#4fc3ff;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="profile">
      <img src="https://i.ibb.co/qMtNXHd7/Whats-App-Image-2026-03-17-at-9-44-37-PM.jpg" alt="Profile">
    </div>

    <div class="title">ITACHI OP</div>

    <div class="subtitle">
      Join our official Telegram community for updates,
      announcements and educational content.
    </div>

    <a href="https://t.me/+WFRHsYL1RD83NmM1" class="btn">
      🚀 JOIN TELEGRAM CHANNEL
    </a>

    <div class="timer-box">
      Redirecting in <span class="timer" id="timer">10</span> seconds...
    </div>

    <div class="footer">
      Official Community Access
    </div>

  </div>

  <script>
    let timeLeft = 2;
    const timerEl = document.getElementById("timer");

    const countdown = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(countdown);
        window.location.href = "https://t.me/+WFRHsYL1RD83NmM1";
      }
    }, 1000);
  </script>

</body>
</html>
